name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out core dependency
        uses: actions/checkout@v4
        with:
          repository: symphos-ai/orcho-core
          path: _deps/orcho-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e _deps/orcho-core
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test with coverage
        run: |
          pytest -q \
            --cov=orcho_mcp \
            --cov=scripts \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
